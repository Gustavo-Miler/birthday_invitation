<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[CONVITE]</title>
    <style>
        body { padding: 0; margin: 0; overflow: hidden; }
        /* Estilos do Pop-up Misterioso */
    #popup-final {
      display: none; /* Fica invisível até a hora certa */
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 300px;
      background: #c0c0c0; /* Cinza clássico Windows 95 */
      border: 2px solid;
      border-color: #ffffff #808080 #808080 #ffffff;
      box-shadow: 5px 5px 20px rgba(0,0,0,0.8);
      z-index: 9999; /* Garante que fique por cima de TUDO */
      padding: 3px;
      font-family: 'Tahoma', sans-serif;
    }
    
    .titulo-final {
      background: #000080;
      color: white;
      padding: 4px 8px;
      font-size: 14px;
      font-weight: bold;
    }
    
    .conteudo-final {
      padding: 40px 20px;
      text-align: center;
    }
    
    #btn-aceitar {
      background: #c0c0c0;
      border: 2px solid;
      border-color: #ffffff #808080 #808080 #ffffff;
      padding: 10px 25px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    
    #btn-aceitar:active {
      border-color: #808080 #ffffff #ffffff #808080; /* Efeito visual de botão afundando ao clicar */
    }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
</head>
<body>
    <script src="sketch.js"></script>
    <div id="popup-final">
    <div class="titulo-final">Você aceita??</div>
    <div class="conteudo-final">
      <button id="btn-aceitar">SIM!!</button>
    </div>
  </div>
</body>
</html>
